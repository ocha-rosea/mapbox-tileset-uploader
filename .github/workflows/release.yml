name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no publish, no tag)'
        required: false
        type: boolean
        default: false

jobs:
  version-bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP_TYPE="${{ inputs.bump_type }}"
          
          # Parse version parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          # Bump based on type
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (bumped $BUMP_TYPE)"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "Generating changelog from all commits..."
            RANGE="HEAD"
            COMPARE_FROM="initial"
          else
            echo "Generating changelog since $LATEST_TAG..."
            RANGE="${LATEST_TAG}..HEAD"
            COMPARE_FROM="$LATEST_TAG"
          fi

          export RANGE
          export COMPARE_FROM
          export NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"

          python - << 'PY'
          import os
          import subprocess

          range_expr = os.environ["RANGE"]
          compare_from = os.environ["COMPARE_FROM"]
          new_version = os.environ["NEW_VERSION"]
          repo = os.environ["GITHUB_REPOSITORY"]

          result = subprocess.run(
              ["git", "log", range_expr, "--pretty=format:%s|%h"],
              capture_output=True,
              text=True,
              check=False,
          )
          lines = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          features = []
          fixes = []
          others = []

          for line in lines:
              subject, short_hash = (line.rsplit("|", 1) + [""])[:2]
              subject = subject.strip()
              short_hash = short_hash.strip()
              entry = f"* {subject} ({short_hash})"
              lower = subject.lower()

              if lower.startswith(("feat:", "feature:")) or " add " in f" {lower} " or "implement" in lower:
                  features.append(entry)
              elif lower.startswith(("fix:", "bugfix:")) or "bug" in lower or "error" in lower or "security" in lower:
                  fixes.append(entry)
              else:
                  others.append(entry)

          with open("changelog.md", "w", encoding="utf-8") as fh:
              fh.write("## What's Changed\n\n")
              fh.write("### Implemented Features\n")
              if features:
                  fh.write("\n".join(features) + "\n")
              else:
                  fh.write("* No feature commits found in this range.\n")

              fh.write("\n### Fixed Bugs\n")
              if fixes:
                  fh.write("\n".join(fixes) + "\n")
              else:
                  fh.write("* No bug-fix commits found in this range.\n")

              if others:
                  fh.write("\n### Other Changes\n")
                  fh.write("\n".join(others) + "\n")

              fh.write("\n")
              fh.write(
                  f"**Full Changelog**: https://github.com/{repo}/compare/{compare_from}...v{new_version}\n"
              )
          PY

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "_Generated from commit history since ${LATEST_TAG:-initial}_" >> changelog.md
          
          # Output for use in release
          {
            echo 'changelog<<EOF'
            cat changelog.md
            echo EOF
          } >> $GITHUB_OUTPUT
          
          echo "--- Generated Changelog ---"
          cat changelog.md

      - name: Update version in pyproject.toml
        if: ${{ inputs.dry_run != true }}
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ steps.bump.outputs.new_version }}"/' pyproject.toml
          echo "Updated pyproject.toml:"
          grep "^version" pyproject.toml

      - name: Commit version bump
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "## 🧪 Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Current version:** ${{ steps.current.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**New version:** ${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump type:** ${{ inputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog Preview" >> $GITHUB_STEP_SUMMARY
          cat changelog.md >> $GITHUB_STEP_SUMMARY

  build-python-dist:
    name: Build Python distribution
    needs: version-bump
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Get the updated version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          echo "Building version: $VERSION"
          if [ "$VERSION" != "${{ needs.version-bump.outputs.new_version }}" ]; then
            echo "::error::Version mismatch! Expected ${{ needs.version-bump.outputs.new_version }}, got $VERSION"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-linux-portable:
    name: Build Linux portable archive
    needs: version-bump
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[windows-build] mapbox-tilesets

      - name: Build Linux executable
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name mtu-desktop \
            --paths src \
            --hidden-import mapbox_tilesets.scripts.cli \
            --hidden-import tkintermapview \
            --collect-all tkintermapview \
            src/mtu/ui_main.py

      - name: Create portable archive
        run: |
          if [ ! -d "dist/mtu-desktop" ]; then
            echo "::error::Expected dist/mtu-desktop output was not found"
            exit 1
          fi
          version="${{ needs.version-bump.outputs.new_version }}"
          archive_name="ROSEA-MTU-v${version}-linux-portable.tar.gz"
          tar -czf "dist/${archive_name}" -C dist mtu-desktop
          echo "archive_name=${archive_name}" >> "$GITHUB_ENV"

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: dist/ROSEA-MTU-v${{ needs.version-bump.outputs.new_version }}-linux-portable.tar.gz

  build-windows-portable:
    name: Build Windows portable ZIP
    needs: version-bump
    if: ${{ inputs.dry_run != true }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows executable
        shell: pwsh
        run: |
          $py = (Get-Command python).Path
          ./scripts/build_windows_exe.ps1 -PythonPath $py

      - name: Create portable zip
        shell: pwsh
        run: |
          if (!(Test-Path "dist/mtu-desktop")) {
            throw "Expected dist/mtu-desktop output was not found"
          }
          $version = "${{ needs.version-bump.outputs.new_version }}"
          $zipName = "ROSEA-MTU-v$version-portable.zip"
          Compress-Archive -Path "dist/mtu-desktop/*" -DestinationPath ("dist/" + $zipName) -Force
          echo "zip_name=$zipName" >> $env:GITHUB_ENV

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/ROSEA-MTU-v${{ needs.version-bump.outputs.new_version }}-portable.zip

  test-install:
    name: Test installation
    needs: build-python-dist
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Install from wheel
        run: |
          pip install dist/*.whl
          mtu --version
          mtu formats

  create-release:
    name: Create GitHub Release with assets
    needs: [version-bump, build-python-dist, build-linux-portable, build-windows-portable]
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Download Linux portable archive
        uses: actions/download-artifact@v4
        with:
          name: linux-portable
          path: dist/

      - name: Download Windows portable ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: v${{ needs.version-bump.outputs.new_version }}
          body: ${{ needs.version-bump.outputs.changelog }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/ROSEA-MTU-v${{ needs.version-bump.outputs.new_version }}-linux-portable.tar.gz
            dist/ROSEA-MTU-v${{ needs.version-bump.outputs.new_version }}-portable.zip

  publish-pypi:
    name: Publish to PyPI
    needs: [version-bump, test-install, create-release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mtu
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Release summary
        run: |
          echo "## 🚀 Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version-bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 [PyPI](https://pypi.org/project/mtu/${{ needs.version-bump.outputs.new_version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version-bump.outputs.new_version }})" >> $GITHUB_STEP_SUMMARY
